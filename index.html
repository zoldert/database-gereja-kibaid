<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Gereja KIBAID</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts: Inter (Body) & Plus Jakarta Sans (Headings) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-heading { font-family: 'Plus Jakarta Sans', sans-serif; }
        .slider-container {
            position: relative;
            width: 100%;
            display: grid;
            grid-template-columns: 100%;
        }
        .slide-item {
            grid-column: 1;
            grid-row: 1;
            width: 100%;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease-in-out;
        }
        .slide-item.active {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 tracking-tight antialiased">

    <!-- HEADER -->
    <header class="sticky top-0 bg-purple-700 py-5 px-4 text-center text-white shadow-md z-50 max-w-md mx-auto flex flex-col items-center gap-1">
        <img id="logo-gereja" src="https://i.ibb.co.com/TxJcbZmH/logo-gereja-kibaid.png" 
             alt="Logo KIBAID" class="w-14 h-14 rounded-full object-cover border-2 border-amber-400 mb-1 shadow-md bg-white">
        
        <h1 class="text-lg font-extrabold font-heading tracking-wider uppercase leading-tight text-amber-300">
            GEREJA KIBAID
        </h1>
        <h2 class="text-xs font-bold font-heading tracking-wide uppercase leading-tight text-white/90">
            JEMAAT AMBON KOTA
        </h2>
        
        <div id="hari-tanggal-berjalan" class="text-[10px] font-medium tracking-wide text-purple-100 mt-1 bg-purple-800/50 px-3 py-0.5 rounded-full">
            Memuat tanggal...
        </div>
    </header>

    <!-- MAIN CONTAINER -->
    <main class="p-4 max-w-md mx-auto space-y-6 pb-12">
        <div id="loading" class="text-center py-6 font-semibold text-purple-900 text-sm">
            ⏳ Memuat data...
        </div>

        <!-- INFO TERKINI -->
        <section class="space-y-3">
            <h2 class="text-base font-extrabold font-heading text-purple-950 border-b-2 border-purple-100 pb-1 px-1">Info Terkini</h2>
            <div id="daftar-berita" class="slider-container rounded-2xl shadow-sm border border-gray-100 bg-white min-h-[140px]">
            </div>
        </section>

        <!-- WARTA HARI INI -->
        <section class="space-y-4">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-xs font-bold text-purple-700 uppercase tracking-widest mb-3 font-heading">Warta Hari Ini</h2>
                <div id="pelayanan-hari-ini" class="space-y-4"></div>
            </div>
        </section>

        <!-- GALERI KEGIATAN -->
        <section class="space-y-3">
            <h2 class="text-base font-extrabold font-heading text-purple-950 border-b-2 border-purple-100 pb-1 px-1">Galeri Kegiatan</h2>
            <div id="grid-galeri" class="grid grid-cols-2 gap-3">
            </div>
        </section>
    </main>

    <!-- MODAL -->
    <div id="lightbox-modal" class="hidden fixed inset-0 bg-black/95 z-50 flex flex-col justify-center items-center p-4" onclick="closeLightbox()">
        <button class="absolute top-6 right-6 text-white text-2xl font-light bg-white/10 w-10 h-10 rounded-full flex justify-center items-center cursor-pointer">&times;</button>
        <img id="lightbox-img" src="" alt="Foto Besar" class="max-w-full max-h-[75vh] object-contain rounded-lg shadow-2xl" onclick="event.stopPropagation()">
        <p id="lightbox-caption" class="text-white text-xs font-semibold mt-4 text-center px-4 max-w-md"></p>
    </div>

    <footer class="bg-gray-800 py-5 text-center text-[9px] text-gray-500 max-w-md mx-auto tracking-widest font-heading">
        &copy; 2026 GEREJA KIBAID JEMAAT AMBON KOTA.
    </footer>

    <!-- SCRIPT -->
    <script>
        const SHEETDB_API_URL = "https://sheetdb.io/api/v1/oq2dn8eyynehu"; 

        function updateHeaderDate() {
            const d = new Date();
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('hari-tanggal-berjalan').innerText = d.toLocaleDateString('id-ID', options);
        }

        function openLightbox(url, title) {
            document.getElementById('lightbox-img').src = url;
            document.getElementById('lightbox-caption').innerText = title;
            document.getElementById('lightbox-modal').classList.remove('hidden');
            document.body.classList.add('overflow-hidden');
        }

        function closeLightbox() {
            document.getElementById('lightbox-modal').classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
        }

        function toggleWarta(idKegiatan) {
            const boxDetail = document.getElementById(`detail-${idKegiatan}`);
            const btnText = document.getElementById(`btn-text-${idKegiatan}`);
            const btnIcon = document.getElementById(`btn-icon-${idKegiatan}`);
            
            if(boxDetail.classList.contains('hidden')) {
                boxDetail.classList.remove('hidden');
                btnText.innerText = "Sembunyikan Detail";
                btnIcon.style.transform = "rotate(180deg)";
            } else {
                boxDetail.classList.add('hidden');
                btnText.innerText = "Selengkapnya";
                btnIcon.style.transform = "rotate(0deg)";
            }
        }

        async function initApp() {
            try {
                updateHeaderDate();
                const t = new Date().getTime();
                const [resBerita, resPelayanan, resGaleri] = await Promise.all([
                    fetch(`${SHEETDB_API_URL}?sheet=berita&t=${t}`).then(r => r.json()),
                    fetch(`${SHEETDB_API_URL}?sheet=pelayanan&t=${t}`).then(r => r.json()),
                    fetch(`${SHEETDB_API_URL}?sheet=galeri&t=${t}`).then(r => r.json())
                ]);

                renderBerita(resBerita);
                renderPelayanan(resPelayanan);
                renderGaleri(resGaleri);
                document.getElementById('loading').classList.add('hidden');
            } catch (error) {
                document.getElementById('loading').innerText = "❌ Gagal memuat data.";
            }
        }

        function renderPelayanan(data) {
            const container = document.getElementById('pelayanan-hari-ini');
            container.innerHTML = '';
            const hariIni = new Date();
            let adaJadwal = false;

            if (Array.isArray(data) && data.length > 0) {
                data.forEach((p, index) => {
                    if(!p.tanggal_waktu) return;
                    const dateObj = new Date(p.tanggal_waktu);
                    if (dateObj.getDate() === hariIni.getDate() && dateObj.getMonth() === hariIni.getMonth() && dateObj.getFullYear() === hariIni.getFullYear()) {
                        adaJadwal = true;
                        const uniqueId = `warta-${index}`;
                        container.innerHTML += `
                            <div class="pb-2 space-y-3">
                                <div class="border-l-4 border-purple-600 pl-3">
                                    <p class="font-bold text-gray-950 text-base font-heading text-purple-950 leading-snug">${p.nama_kegiatan}</p>
                                    <p class="text-xs font-semibold text-gray-500 mt-0.5"> Jam ${dateObj.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})} WIT</p>
                                </div>
                                <button onclick="toggleWarta('${uniqueId}')" class="w-full flex items-center justify-between py-2 px-3 bg-purple-50 rounded-xl text-purple-700 font-bold text-xs font-heading">
                                    <span id="btn-text-${uniqueId}">Selengkapnya</span>
                                    <svg id="btn-icon-${uniqueId}" class="w-4 h-4 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </button>
                                <div id="detail-${uniqueId}" class="hidden bg-gray-50 rounded-xl border border-gray-100 p-3 text-xs space-y-2">
                                    <div><span class="font-bold text-gray-400 block text-[10px] uppercase">Khotbah</span>${p.pengkhotbah || '-'}</div>
                                    <div><span class="font-bold text-gray-400 block text-[10px] uppercase">Pelayan Liturgi</span>${p.pelayan_liturgi || '-'}</div>
                                </div>
                            </div>
                        `;
                    }
                });
            }
            if (!adaJadwal) container.innerHTML = `<div class="text-gray-400 text-center py-2 text-sm italic">Tidak ada jadwal pelayanan hari ini.</div>`;
        }

        let currentSlideIdx = 0;
        function runInfoSlider(totalSlides) {
            if (totalSlides <= 1) return;
            setInterval(() => {
                const slides = document.querySelectorAll('.slide-item');
                slides[currentSlideIdx].classList.remove('active');
                currentSlideIdx = (currentSlideIdx + 1) % totalSlides;
                slides[currentSlideIdx].classList.add('active');
            }, 10000);
        }

        function renderBerita(data) {
            const container = document.getElementById('daftar-berita');
            container.innerHTML = '';
            const hariIni = new Date();
            let validBeritaCount = 0;

            if (Array.isArray(data)) {
                [...data].reverse().forEach((b) => {
                    if (String(b.aktif || "").trim().toUpperCase() === "TRUE") {
                        if (b.tanggal_publikasi) {
                            const tglPublikasi = new Date(b.tanggal_publikasi);
                            if ((hariIni - tglPublikasi) / (1000 * 60 * 60 * 24) > 7) return; 
                        }
                        container.innerHTML += `
                            <div id="slide-${validBeritaCount}" class="slide-item p-5 min-h-[140px] ${validBeritaCount === 0 ? 'active' : ''}">
                                <h3 class="font-bold text-gray-950 text-base font-heading">${b.judul}</h3>
                                <span class="text-[10px] text-gray-400 block mb-2 font-medium">📅 ${b.tanggal_publikasi || ''}</span>
                                <p class="text-sm text-gray-600 leading-relaxed font-normal">${b.isi_konten}</p>
                            </div>
                        `;
                        validBeritaCount++;
                    }
                });
            }
            if (validBeritaCount > 0) runInfoSlider(validBeritaCount);
            else container.innerHTML = '<div class="p-5 text-gray-400 text-sm italic text-center">Belum ada informasi terbaru.</div>';
        }

        function renderGaleri(data) {
            const container = document.getElementById('grid-galeri');
            container.innerHTML = '';
            if (Array.isArray(data)) {
                data.reverse().forEach(g => {
                    container.innerHTML += `
                        <div class="bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100 cursor-pointer" onclick="openLightbox('${g.url_foto}', '${g.judul_kegiatan}')">
                            <img src="${g.url_foto}" class="w-full h-28 object-cover">
                            <div class="p-2">
                                <p class="text-xs font-bold text-gray-950 truncate">${g.judul_kegiatan}</p>
                            </div>
                        </div>
                    `;
                });
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
