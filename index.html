<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Gereja KIBAID</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-heading { font-family: 'Plus Jakarta Sans', sans-serif; }
        .slider-container { position: relative; width: 100%; display: grid; grid-template-columns: 100%; }
        .slide-item { grid-column: 1; grid-row: 1; width: 100%; opacity: 0; pointer-events: none; transition: opacity 0.8s ease-in-out; }
        .slide-item.active { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">

    <header class="sticky top-0 bg-purple-700 py-5 px-4 text-center text-white shadow-md z-50 max-w-md mx-auto flex flex-col items-center gap-1">
        <img src="https://i.ibb.co.com/TxJcbZmH/logo-gereja-kibaid.png" class="w-14 h-14 rounded-full object-cover border-2 border-amber-400 mb-1 shadow-md bg-white">
        <h1 class="text-lg font-extrabold font-heading text-amber-300 uppercase">GEREJA KIBAID</h1>
        <h2 class="text-xs font-bold font-heading text-white/90 uppercase">JEMAAT AMBON KOTA</h2>
        <div id="hari-tanggal-berjalan" class="text-[10px] bg-purple-800/50 px-3 py-0.5 rounded-full mt-1">Memuat...</div>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-6 pb-12">
        <div id="loading" class="text-center py-6 font-semibold text-purple-900 text-sm">⏳ Memuat data...</div>

        <section class="space-y-3">
            <h2 class="text-base font-extrabold font-heading text-purple-950 border-b-2 border-purple-100 pb-1 px-1">Info Terkini</h2>
            <div id="daftar-berita" class="slider-container rounded-2xl shadow-sm border border-gray-100 bg-white min-h-[140px]"></div>
        </section>

        <section class="space-y-4">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-xs font-bold text-purple-700 uppercase tracking-widest mb-3 font-heading">Warta Hari Ini</h2>
                <div id="pelayanan-hari-ini" class="space-y-4"></div>
            </div>
        </section>

        <section class="space-y-3">
            <h2 class="text-base font-extrabold font-heading text-purple-950 border-b-2 border-purple-100 pb-1 px-1">Galeri Kegiatan</h2>
            <div id="grid-galeri" class="grid grid-cols-2 gap-3"></div>
        </section>

        <section class="space-y-3">
            <h2 class="text-base font-extrabold font-heading text-purple-950 border-b-2 border-purple-100 pb-1 px-1">Pertanyaan Umum (FAQ)</h2>
            <div id="daftar-faq" class="space-y-2"></div>
        </section>
    </main>

    <div id="lightbox-modal" class="hidden fixed inset-0 bg-black/95 z-50 flex flex-col justify-center items-center p-4" onclick="closeLightbox()">
        <button class="absolute top-6 right-6 text-white text-2xl font-light bg-white/10 w-10 h-10 rounded-full flex justify-center items-center">&times;</button>
        <img id="lightbox-img" src="" class="max-w-full max-h-[75vh] object-contain rounded-lg shadow-2xl">
    </div>

    <script>
        // MASUKKAN URL BARU HASIL "NEW DEPLOYMENT" ANDA DI SINI
        const API = "https://script.google.com/macros/s/AKfycbxDuBBTmdtGMD0ni9PWVhvtmjEfX6MVwamVSLjXnjzhPg2MB027LWZrPecZtU25hxMIdg/exec";
        let currentSlideIdx = 0;

        function formatTanggalIndo(dateString) {
            if (!dateString) return "";
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return dateString;
            return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        async function initApp() {
            try {
                document.getElementById('hari-tanggal-berjalan').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                
                // Kembali menggunakan fetch murni yang jauh lebih stabil
                const [berita, pelayanan, galeri, faq] = await Promise.all([
                    fetch(`${API}?sheet=berita`).then(r => r.json()),
                    fetch(`${API}?sheet=pelayanan`).then(r => r.json()),
                    fetch(`${API}?sheet=galeri`).then(r => r.json()),
                    fetch(`${API}?sheet=faq`).then(r => r.json())
                ]);
                
                renderBerita(berita);
                renderPelayanan(pelayanan);
                renderGaleri(galeri);
                renderFAQ(faq);
                
                document.getElementById('loading').classList.add('hidden');
            } catch (e) { 
                document.getElementById('loading').innerText = "❌ Gagal memuat data."; 
                console.error(e); 
            }
        }

        function renderFAQ(data) {
            const cont = document.getElementById('daftar-faq');
            cont.innerHTML = '';
            if (Array.isArray(data)) {
                data.forEach((item, i) => {
                    if(!item.Pertanyaan) return;
                    cont.innerHTML += `
                        <div class="bg-white rounded-xl shadow-sm border border-gray-100">
                            <button onclick="toggleFAQ('faq-${i}')" class="w-full text-left p-4 flex justify-between items-center text-sm font-bold text-purple-900">
                                ${item.Pertanyaan} <span id="icon-faq-${i}">▼</span>
                            </button>
                            <div id="faq-${i}" class="hidden p-4 pt-0 text-xs text-gray-600 border-t border-gray-50">${item.Jawaban || ''}</div>
                        </div>`;
                });
            }
        }

        function toggleFAQ(id) {
            const el = document.getElementById(id);
            el.classList.toggle('hidden');
            document.getElementById('icon-' + id).innerText = el.classList.contains('hidden') ? '▼' : '▲';
        }

        function openLightbox(url) { document.getElementById('lightbox-img').src = url; document.getElementById('lightbox-modal').classList.remove('hidden'); }
        function closeLightbox() { document.getElementById('lightbox-modal').classList.add('hidden'); }
        
        function renderBerita(data) {
            const cont = document.getElementById('daftar-berita');
            if (Array.isArray(data)) {
                const valid = data.filter(b => String(b.aktif).toUpperCase() === "TRUE");
                valid.reverse().forEach((b, i) => {
                    const tglRapi = formatTanggalIndo(b.tanggal_publikasi);
                    cont.innerHTML += `<div id="slide-${i}" class="slide-item p-5 ${i===0 ? 'active':''}"><h3 class="font-bold text-gray-950 text-base font-heading">${b.judul}</h3><span class="text-[10px] text-gray-400 block mb-2">📅 ${tglRapi}</span><p class="text-sm text-gray-600">${b.isi_konten}</p></div>`;
                });
                if (valid.length > 1) setInterval(() => {
                    const slides = document.querySelectorAll('.slide-item');
                    if(slides.length > 0) {
                        slides[currentSlideIdx].classList.remove('active');
                        currentSlideIdx = (currentSlideIdx + 1) % valid.length;
                        slides[currentSlideIdx].classList.add('active');
                    }
                }, 10000);
            }
        }

        function renderPelayanan(data) {
            const cont = document.getElementById('pelayanan-hari-ini');
            if (Array.isArray(data)) {
                const hari = new Date();
                const today = data.filter(p => {
                    if(!p.tanggal_waktu) return false;
                    const d = new Date(p.tanggal_waktu);
                    return d.getDate() === hari.getDate() && d.getMonth() === hari.getMonth() && d.getFullYear() === hari.getFullYear();
                });
                if (today.length === 0) cont.innerHTML = '<p class="text-gray-400 text-center text-sm italic py-2">Tidak ada jadwal ibadah hari ini.</p>';
                else today.forEach(p => cont.innerHTML += `<div class="border-l-4 border-purple-600 pl-3"><p class="font-bold text-gray-950 font-heading text-purple-950">${p.nama_kegiatan}</p></div>`);
            } else {
                cont.innerHTML = '<p class="text-gray-400 text-center text-sm italic py-2">Tidak ada jadwal ibadah hari ini.</p>';
            }
        }

        function renderGaleri(data) {
            const cont = document.getElementById('grid-galeri');
            if (Array.isArray(data)) {
                data.reverse().slice(0, 4).forEach(g => {
                    const tglRapi = formatTanggalIndo(g.tanggal_kegiatan);
                    cont.innerHTML += `<div class="bg-white rounded-xl shadow-sm border border-gray-100 cursor-pointer overflow-hidden" onclick="openLightbox('${g.url_foto}')"><img src="${g.url_foto}" class="w-full h-28 object-cover"><div class="p-2"><p class="text-xs font-bold truncate font-heading text-gray-950">${g.judul_kegiatan}</p><p class="text-[9px] text-gray-400">📅 ${tglRapi}</p></div></div>`;
                });
            }
        }
        window.onload = initApp;
    </script>
</body>
</html>
