<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gereja KIBAID Jemaat Ambon Kota</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ungu: {
            tua: '#3D1A52',
            sedang: '#6B3FA0',
            lembut: '#F1E9F7',
            terang: '#EDE3F7'
          },
          teks: '#2A2230',
          maroon: '#8C3A3A'
        },
        fontFamily: {
          display: ['Anton', 'sans-serif'],
          sub: ['Oswald', 'sans-serif'],
          body: ['Inter', 'sans-serif']
        }
      }
    }
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { font-family: 'Inter', sans-serif; }
  .font-display { font-family: 'Anton', sans-serif; letter-spacing: 0.02em; }
  .font-sub { font-family: 'Oswald', sans-serif; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #C9A9D9; border-radius: 3px; }
  .tab-active { color: #3D1A52; }
  .tab-inactive { color: #B9A6C7; }
  .view { display: none; }
  .view.active { display: block; }
  .fade-in { animation: fadeIn 0.25s ease-in; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .motif-strip {
    height: 6px;
    background: repeating-linear-gradient(135deg, #3D1A52 0 10px, #6B3FA0 10px 20px, #C9A9D9 20px 30px);
  }
</style>
</head>
<body class="bg-white text-teks pb-24 min-h-screen">

<!-- HEADER -->
<header class="bg-ungu-tua text-white sticky top-0 z-40 shadow-md">
  <div class="motif-strip"></div>
  <div class="px-5 pt-4 pb-4 flex items-center justify-between">
    <div>
      <h1 class="font-display text-2xl leading-none tracking-wide">GEREJA KIBAID</h1>
      <p class="font-sub text-xs text-ungu-terang mt-1 tracking-wider uppercase">Jemaat Ambon Kota</p>
    </div>
    <div id="statusBadge" class="text-[10px] font-sub uppercase tracking-wider bg-ungu-sedang/60 px-2 py-1 rounded-full">
      Publik
    </div>
  </div>
</header>

<!-- MAIN CONTENT -->
<main class="max-w-lg mx-auto px-4 pt-5">

  <!-- VIEW: BERANDA -->
  <section id="view-beranda" class="view active fade-in">
    <h2 class="font-sub text-lg uppercase tracking-wide text-ungu-tua mb-3">Jadwal Mendatang</h2>
    <div id="jadwalList" class="space-y-3 mb-8">
      <p class="text-sm text-gray-400">Memuat jadwal...</p>
    </div>

    <h2 class="font-sub text-lg uppercase tracking-wide text-ungu-tua mb-3">Ringkasan Keuangan Bulan Ini</h2>
    <div id="ringkasanKeuangan" class="grid grid-cols-3 gap-2 mb-4">
      <div class="bg-ungu-lembut rounded-xl p-3 text-center">
        <p class="text-[10px] font-sub uppercase text-ungu-sedang">Persembahan</p>
        <p id="totalPersembahan" class="font-semibold text-sm mt-1">Rp 0</p>
      </div>
      <div class="bg-ungu-lembut rounded-xl p-3 text-center">
        <p class="text-[10px] font-sub uppercase text-maroon">Pengeluaran</p>
        <p id="totalPengeluaran" class="font-semibold text-sm mt-1">Rp 0</p>
      </div>
      <div class="bg-ungu-lembut rounded-xl p-3 text-center">
        <p class="text-[10px] font-sub uppercase text-ungu-sedang">Dana Khusus</p>
        <p id="totalDanaKhusus" class="font-semibold text-sm mt-1">Rp 0</p>
      </div>
    </div>
  </section>

  <!-- VIEW: KEUANGAN -->
  <section id="view-keuangan" class="view fade-in">
    <h2 class="font-sub text-lg uppercase tracking-wide text-ungu-tua mb-3">Riwayat Keuangan</h2>
    <div id="keuanganList" class="space-y-2">
      <p class="text-sm text-gray-400">Memuat data...</p>
    </div>
  </section>

  <!-- VIEW: JEMAAT -->
  <section id="view-jemaat" class="view fade-in">
    <h2 class="font-sub text-lg uppercase tracking-wide text-ungu-tua mb-3">Data Jemaat</h2>
    <input id="cariJemaat" type="text" placeholder="Cari nama jemaat..." class="w-full border border-ungu-terang rounded-lg px-3 py-2 mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-ungu-sedang">
    <div id="jemaatList" class="space-y-2">
      <p class="text-sm text-gray-400">Memuat data...</p>
    </div>
  </section>

  <!-- VIEW: ADMIN -->
  <section id="view-admin" class="view fade-in">

    <!-- Login Form -->
    <div id="loginBox">
      <h2 class="font-sub text-lg uppercase tracking-wide text-ungu-tua mb-3">Masuk Pengurus</h2>
      <div class="space-y-3">
        <input id="loginEmail" type="email" placeholder="Email" class="w-full border border-ungu-terang rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-ungu-sedang">
        <input id="loginPassword" type="password" placeholder="Kata sandi" class="w-full border border-ungu-terang rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-ungu-sedang">
        <button onclick="login()" class="w-full bg-ungu-tua text-white font-sub uppercase tracking-wide py-2 rounded-lg text-sm hover:bg-ungu-sedang transition">Masuk</button>
        <p id="loginError" class="text-xs text-maroon hidden"></p>
      </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="dashboardBox" class="hidden">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-sub text-lg uppercase tracking-wide text-ungu-tua">Panel Pengurus</h2>
        <button onclick="logout()" class="text-xs font-sub uppercase text-maroon border border-maroon rounded-full px-3 py-1">Keluar</button>
      </div>

      <!-- Sub tabs -->
      <div class="flex gap-2 mb-4 text-xs font-sub uppercase">
        <button onclick="showAdminTab('jemaat')" id="atab-jemaat" class="admin-tab px-3 py-1.5 rounded-full bg-ungu-tua text-white">Jemaat</button>
        <button onclick="showAdminTab('keuangan')" id="atab-keuangan" class="admin-tab px-3 py-1.5 rounded-full bg-ungu-lembut text-ungu-tua">Keuangan</button>
        <button onclick="showAdminTab('jadwal')" id="atab-jadwal" class="admin-tab px-3 py-1.5 rounded-full bg-ungu-lembut text-ungu-tua">Jadwal</button>
      </div>

      <!-- Admin: Jemaat -->
      <div id="admin-jemaat" class="admin-panel space-y-2">
        <div class="bg-ungu-lembut rounded-xl p-3 space-y-2 mb-3">
          <input id="j_nama" placeholder="Nama lengkap" class="w-full border border-white rounded-lg px-3 py-2 text-sm">
          <input id="j_alamat" placeholder="Alamat" class="w-full border border-white rounded-lg px-3 py-2 text-sm">
          <input id="j_hp" placeholder="No. HP" class="w-full border border-white rounded-lg px-3 py-2 text-sm">
          <input id="j_tgl" type="date" class="w-full border border-white rounded-lg px-3 py-2 text-sm">
          <select id="j_status" class="w-full border border-white rounded-lg px-3 py-2 text-sm">
            <option value="">Status keluarga</option>
            <option>Kepala Keluarga</option>
            <option>Anggota Keluarga</option>
          </select>
          <input id="j_kolom" placeholder="Kolom / wilayah pelayanan" class="w-full border border-white rounded-lg px-3 py-2 text-sm">
          <button onclick="tambahJemaat()" class="w-full bg-ungu-tua text-white font-sub uppercase text-xs py-2 rounded-lg">Simpan Jemaat</button>
        </div>
        <div id="adminJemaatList" class="space-y-2"></div>
      </div>

      <!-- Admin: Keuangan -->
      <div id="admin-keuangan" class="admin-panel space-y-2 hidden">
        <div class="bg-ungu-lembut rounded-xl p-3 space-y-2 mb-3">
          <input id="k_tanggal" type="date" class="w-full border border-white rounded-lg px-3 py-2 text-sm">
          <select id="k_jenis" class="w-full border border-white rounded-lg px-3 py-2 text-sm">
            <option value="">Jenis transaksi</option>
            <option>Persembahan</option>
            <option>Pengeluaran</option>
            <option>Dana Khusus</option>
          </select>
          <input id="k_kategori" placeholder="Kategori (misal: kolekte minggu, listrik)" class="w-full border border-white rounded-lg px-3 py-2 text-sm">
          <input id="k_jumlah" type="number" placeholder="Jumlah (Rp)" class="w-full border border-white rounded-lg px-3 py-2 text-sm">
          <input id="k_ket" placeholder="Keterangan" class="w-full border border-white rounded-lg px-3 py-2 text-sm">
          <button onclick="tambahKeuangan()" class="w-full bg-ungu-tua text-white font-sub uppercase text-xs py-2 rounded-lg">Simpan Transaksi</button>
        </div>
        <div id="adminKeuanganList" class="space-y-2"></div>
      </div>

      <!-- Admin: Jadwal -->
      <div id="admin-jadwal" class="admin-panel space-y-2 hidden">
        <div class="bg-ungu-lembut rounded-xl p-3 space-y-2 mb-3">
          <input id="jd_judul" placeholder="Judul kegiatan" class="w-full border border-white rounded-lg px-3 py-2 text-sm">
          <select id="jd_jenis" class="w-full border border-white rounded-lg px-3 py-2 text-sm">
            <option value="">Jenis</option>
            <option>Ibadah</option>
            <option>Pelayanan</option>
          </select>
          <input id="jd_tanggal" type="date" class="w-full border border-white rounded-lg px-3 py-2 text-sm">
          <input id="jd_waktu" type="time" class="w-full border border-white rounded-lg px-3 py-2 text-sm">
          <input id="jd_lokasi" placeholder="Lokasi" class="w-full border border-white rounded-lg px-3 py-2 text-sm">
          <input id="jd_ket" placeholder="Keterangan" class="w-full border border-white rounded-lg px-3 py-2 text-sm">
          <button onclick="tambahJadwal()" class="w-full bg-ungu-tua text-white font-sub uppercase text-xs py-2 rounded-lg">Simpan Jadwal</button>
        </div>
        <div id="adminJadwalList" class="space-y-2"></div>
      </div>
    </div>
  </section>

</main>

<!-- BOTTOM NAV -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-ungu-terang z-40">
  <div class="max-w-lg mx-auto grid grid-cols-4 text-center">
    <button onclick="showView('beranda')" id="nav-beranda" class="nav-btn tab-active py-3 flex flex-col items-center gap-1">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg>
      <span class="text-[10px] font-sub uppercase">Beranda</span>
    </button>
    <button onclick="showView('keuangan')" id="nav-keuangan" class="nav-btn tab-inactive py-3 flex flex-col items-center gap-1">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M3 10h18"/></svg>
      <span class="text-[10px] font-sub uppercase">Keuangan</span>
    </button>
    <button onclick="showView('jemaat')" id="nav-jemaat" class="nav-btn tab-inactive py-3 flex flex-col items-center gap-1">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3"/><path d="M2 20c0-3 3-5 7-5s7 2 7 5"/><circle cx="17" cy="9" r="2.5"/><path d="M22 20c0-2.5-2-4-4.5-4.3"/></svg>
      <span class="text-[10px] font-sub uppercase">Jemaat</span>
    </button>
    <button onclick="showView('admin')" id="nav-admin" class="nav-btn tab-inactive py-3 flex flex-col items-center gap-1">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z"/></svg>
      <span class="text-[10px] font-sub uppercase">Pengurus</span>
    </button>
  </div>
</nav>

<script>
  // ================= KONFIGURASI SUPABASE =================
  const SUPABASE_URL = 'https://udorycaiusvxsfxqoihg.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_-4nLJ-m4lAqwSgAiG9HOxQ_LxAEzG68';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let isAdmin = false;

  function formatRp(n) {
    return 'Rp ' + Number(n || 0).toLocaleString('id-ID');
  }
  function formatTanggal(d) {
    if (!d) return '';
    return new Date(d).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  // ================= NAVIGASI =================
  function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('tab-active'); b.classList.add('tab-inactive'); });
    document.getElementById('nav-' + name).classList.add('tab-active');
    document.getElementById('nav-' + name).classList.remove('tab-inactive');
  }

  function showAdminTab(name) {
    document.querySelectorAll('.admin-panel').forEach(p => p.classList.add('hidden'));
    document.getElementById('admin-' + name).classList.remove('hidden');
    document.querySelectorAll('.admin-tab').forEach(t => { t.classList.remove('bg-ungu-tua','text-white'); t.classList.add('bg-ungu-lembut','text-ungu-tua'); });
    document.getElementById('atab-' + name).classList.add('bg-ungu-tua','text-white');
    document.getElementById('atab-' + name).classList.remove('bg-ungu-lembut','text-ungu-tua');
  }

  // ================= AUTH =================
  async function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errEl = document.getElementById('loginError');
    errEl.classList.add('hidden');
    if (!email || !password) {
      errEl.textContent = 'Isi email dan kata sandi terlebih dahulu.';
      errEl.classList.remove('hidden');
      return;
    }
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      errEl.textContent = 'Gagal masuk: email atau kata sandi salah.';
      errEl.classList.remove('hidden');
      return;
    }
    await checkAdminStatus();
  }

  async function logout() {
    await sb.auth.signOut();
    isAdmin = false;
    document.getElementById('loginBox').classList.remove('hidden');
    document.getElementById('dashboardBox').classList.add('hidden');
    document.getElementById('statusBadge').textContent = 'Publik';
  }

  async function checkAdminStatus() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { isAdmin = false; return; }
    const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
    if (profile) {
      isAdmin = true;
      document.getElementById('loginBox').classList.add('hidden');
      document.getElementById('dashboardBox').classList.remove('hidden');
      document.getElementById('statusBadge').textContent = 'Pengurus: ' + profile.nama;
      loadAdminJemaat();
      loadAdminKeuangan();
      loadAdminJadwal();
    } else {
      const errEl = document.getElementById('loginError');
      errEl.textContent = 'Akun ini belum terdaftar sebagai pengurus.';
      errEl.classList.remove('hidden');
      await sb.auth.signOut();
    }
  }

  // ================= BERANDA: JADWAL + RINGKASAN =================
  async function loadJadwal() {
    const today = new Date().toISOString().slice(0,10);
    const { data, error } = await sb.from('jadwal').select('*').gte('tanggal', today).order('tanggal', { ascending: true }).limit(5);
    const el = document.getElementById('jadwalList');
    if (error || !data || data.length === 0) {
      el.innerHTML = '<p class="text-sm text-gray-400">Belum ada jadwal mendatang.</p>';
      return;
    }
    el.innerHTML = data.map(j => `
      <div class="border border-ungu-terang rounded-xl p-3">
        <p class="text-[10px] font-sub uppercase text-ungu-sedang">${j.jenis}</p>
        <p class="font-semibold text-sm">${j.judul}</p>
        <p class="text-xs text-gray-500 mt-1">${formatTanggal(j.tanggal)}${j.waktu ? ' • ' + j.waktu.slice(0,5) : ''}${j.lokasi ? ' • ' + j.lokasi : ''}</p>
      </div>
    `).join('');
  }

  async function loadRingkasanKeuangan() {
    const startBulan = new Date(); startBulan.setDate(1);
    const startStr = startBulan.toISOString().slice(0,10);
    const { data, error } = await sb.from('keuangan').select('*').gte('tanggal', startStr);
    if (error || !data) return;
    const totalByJenis = (jenis) => data.filter(d => d.jenis === jenis).reduce((a,b) => a + Number(b.jumlah), 0);
    document.getElementById('totalPersembahan').textContent = formatRp(totalByJenis('Persembahan'));
    document.getElementById('totalPengeluaran').textContent = formatRp(totalByJenis('Pengeluaran'));
    document.getElementById('totalDanaKhusus').textContent = formatRp(totalByJenis('Dana Khusus'));
  }

  // ================= KEUANGAN (RIWAYAT) =================
  async function loadKeuanganList() {
    const { data, error } = await sb.from('keuangan').select('*').order('tanggal', { ascending: false }).limit(50);
    const el = document.getElementById('keuanganList');
    if (error || !data || data.length === 0) {
      el.innerHTML = '<p class="text-sm text-gray-400">Belum ada data keuangan.</p>';
      return;
    }
    el.innerHTML = data.map(k => `
      <div class="flex items-center justify-between border border-ungu-terang rounded-xl p-3">
        <div>
          <p class="text-[10px] font-sub uppercase ${k.jenis === 'Pengeluaran' ? 'text-maroon' : 'text-ungu-sedang'}">${k.jenis}${k.kategori ? ' • ' + k.kategori : ''}</p>
          <p class="text-xs text-gray-500">${formatTanggal(k.tanggal)}</p>
        </div>
        <p class="font-semibold text-sm ${k.jenis === 'Pengeluaran' ? 'text-maroon' : 'text-ungu-tua'}">${k.jenis === 'Pengeluaran' ? '-' : '+'} ${formatRp(k.jumlah)}</p>
      </div>
    `).join('');
  }

  // ================= JEMAAT (PUBLIK) =================
  let semuaJemaatPublik = [];
  async function loadJemaatPublik() {
    const { data, error } = await sb.from('jemaat_publik').select('*').order('nama', { ascending: true });
    if (error || !data) return;
    semuaJemaatPublik = data;
    renderJemaatPublik(data);
  }
  function renderJemaatPublik(data) {
    const el = document.getElementById('jemaatList');
    if (data.length === 0) {
      el.innerHTML = '<p class="text-sm text-gray-400">Tidak ada data ditemukan.</p>';
      return;
    }
    el.innerHTML = data.map(j => `
      <div class="flex items-center justify-between border border-ungu-terang rounded-xl px-3 py-2.5">
        <p class="text-sm font-medium">${j.nama}</p>
        <p class="text-xs text-ungu-sedang font-sub uppercase">${j.kolom || '-'}</p>
      </div>
    `).join('');
  }
  document.getElementById('cariJemaat').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    renderJemaatPublik(semuaJemaatPublik.filter(j => j.nama.toLowerCase().includes(q)));
  });

  // ================= ADMIN: JEMAAT =================
  async function tambahJemaat() {
    const payload = {
      nama: document.getElementById('j_nama').value.trim(),
      alamat: document.getElementById('j_alamat').value.trim(),
      no_hp: document.getElementById('j_hp').value.trim(),
      tanggal_lahir: document.getElementById('j_tgl').value || null,
      status_keluarga: document.getElementById('j_status').value,
      kolom: document.getElementById('j_kolom').value.trim()
    };
    if (!payload.nama) { alert('Nama wajib diisi.'); return; }
    const { error } = await sb.from('jemaat').insert(payload);
    if (error) { alert('Gagal menyimpan: ' + error.message); return; }
    ['j_nama','j_alamat','j_hp','j_tgl','j_status','j_kolom'].forEach(id => document.getElementById(id).value = '');
    loadAdminJemaat();
    loadJemaatPublik();
  }
  async function loadAdminJemaat() {
    const { data, error } = await sb.from('jemaat').select('*').order('nama', { ascending: true });
    const el = document.getElementById('adminJemaatList');
    if (error || !data) { el.innerHTML = ''; return; }
    el.innerHTML = data.map(j => `
      <div class="flex items-center justify-between border border-ungu-terang rounded-xl px-3 py-2.5">
        <div>
          <p class="text-sm font-medium">${j.nama} <span class="text-xs text-gray-400">(${j.status_keluarga || '-'})</span></p>
          <p class="text-xs text-gray-500">${j.alamat || '-'} • ${j.no_hp || '-'} • ${j.kolom || '-'}</p>
        </div>
        <button onclick="hapusData('jemaat','${j.id}')" class="text-maroon text-xs font-sub uppercase">Hapus</button>
      </div>
    `).join('');
  }

  // ================= ADMIN: KEUANGAN =================
  async function tambahKeuangan() {
    const payload = {
      tanggal: document.getElementById('k_tanggal').value,
      jenis: document.getElementById('k_jenis').value,
      kategori: document.getElementById('k_kategori').value.trim(),
      jumlah: Number(document.getElementById('k_jumlah').value),
      keterangan: document.getElementById('k_ket').value.trim()
    };
    if (!payload.tanggal || !payload.jenis || !payload.jumlah) { alert('Tanggal, jenis, dan jumlah wajib diisi.'); return; }
    const { error } = await sb.from('keuangan').insert(payload);
    if (error) { alert('Gagal menyimpan: ' + error.message); return; }
    ['k_tanggal','k_jenis','k_kategori','k_jumlah','k_ket'].forEach(id => document.getElementById(id).value = '');
    loadAdminKeuangan();
    loadKeuanganList();
    loadRingkasanKeuangan();
  }
  async function loadAdminKeuangan() {
    const { data, error } = await sb.from('keuangan').select('*').order('tanggal', { ascending: false }).limit(50);
    const el = document.getElementById('adminKeuanganList');
    if (error || !data) { el.innerHTML = ''; return; }
    el.innerHTML = data.map(k => `
      <div class="flex items-center justify-between border border-ungu-terang rounded-xl px-3 py-2.5">
        <div>
          <p class="text-sm font-medium">${k.jenis} <span class="text-xs text-gray-400">${k.kategori || ''}</span></p>
          <p class="text-xs text-gray-500">${formatTanggal(k.tanggal)} • ${formatRp(k.jumlah)}</p>
        </div>
        <button onclick="hapusData('keuangan','${k.id}')" class="text-maroon text-xs font-sub uppercase">Hapus</button>
      </div>
    `).join('');
  }

  // ================= ADMIN: JADWAL =================
  async function tambahJadwal() {
    const payload = {
      judul: document.getElementById('jd_judul').value.trim(),
      jenis: document.getElementById('jd_jenis').value,
      tanggal: document.getElementById('jd_tanggal').value,
      waktu: document.getElementById('jd_waktu').value || null,
      lokasi: document.getElementById('jd_lokasi').value.trim(),
      keterangan: document.getElementById('jd_ket').value.trim()
    };
    if (!payload.judul || !payload.jenis || !payload.tanggal) { alert('Judul, jenis, dan tanggal wajib diisi.'); return; }
    const { error } = await sb.from('jadwal').insert(payload);
    if (error) { alert('Gagal menyimpan: ' + error.message); return; }
    ['jd_judul','jd_jenis','jd_tanggal','jd_waktu','jd_lokasi','jd_ket'].forEach(id => document.getElementById(id).value = '');
    loadAdminJadwal();
    loadJadwal();
  }
  async function loadAdminJadwal() {
    const { data, error } = await sb.from('jadwal').select('*').order('tanggal', { ascending: false }).limit(50);
    const el = document.getElementById('adminJadwalList');
    if (error || !data) { el.innerHTML = ''; return; }
    el.innerHTML = data.map(j => `
      <div class="flex items-center justify-between border border-ungu-terang rounded-xl px-3 py-2.5">
        <div>
          <p class="text-sm font-medium">${j.judul} <span class="text-xs text-gray-400">(${j.jenis})</span></p>
          <p class="text-xs text-gray-500">${formatTanggal(j.tanggal)}${j.waktu ? ' • ' + j.waktu.slice(0,5) : ''} • ${j.lokasi || '-'}</p>
        </div>
        <button onclick="hapusData('jadwal','${j.id}')" class="text-maroon text-xs font-sub uppercase">Hapus</button>
      </div>
    `).join('');
  }

  // ================= HAPUS DATA (UMUM) =================
  async function hapusData(table, id) {
    if (!confirm('Yakin ingin menghapus data ini?')) return;
    const { error } = await sb.from(table).delete().eq('id', id);
    if (error) { alert('Gagal menghapus: ' + error.message); return; }
    if (table === 'jemaat') { loadAdminJemaat(); loadJemaatPublik(); }
    if (table === 'keuangan') { loadAdminKeuangan(); loadKeuanganList(); loadRingkasanKeuangan(); }
    if (table === 'jadwal') { loadAdminJadwal(); loadJadwal(); }
  }

  // ================= INIT =================
  (async function init() {
    loadJadwal();
    loadRingkasanKeuangan();
    loadKeuanganList();
    loadJemaatPublik();
    await checkAdminStatus();
  })();
</script>
</body>
</html>
